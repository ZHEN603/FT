services:
  postgres:
    image: postgres:16-alpine
    container_name: ft-postgres
    environment:
      POSTGRES_USER: ft_user
      POSTGRES_PASSWORD: ft_password
      POSTGRES_DB: ft_dev
    ports:
      - "5432:5432"
    volumes:
      - ft-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ft_user -d ft_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ft-postgres-data:
